<!-- Warp Blend Inputs -->
<div class="input-group">
  <label>Warp Blend %</label>
  <div style="display: flex; gap: 10px;">
    <input type="number" id="warpBlend1" placeholder="Fiber 1 % (e.g., 60)" min="0" max="100">
    <input type="number" id="warpBlend2" placeholder="Fiber 2 % (e.g., 40)" min="0" max="100">
  </div>
</div>

<!-- Weft Blend Inputs -->
<div class="input-group">
  <label>Weft Blend %</label>
  <div style="display: flex; gap: 10px;">
    <input type="number" id="weftBlend1" placeholder="Fiber 1 % (e.g., 65)" min="0" max="100">
    <input type="number" id="weftBlend2" placeholder="Fiber 2 % (e.g., 35)" min="0" max="100">
  </div>
</div>

<!-- Output Section (Place this where your results are displayed) -->
<div class="results-box">
  <h3>GSM Breakdown</h3>
  <p>Total Warp GSM: <span id="totalWarpGsm">0.00</span></p>
  <p class="blend-detail">Warp Fiber 1: <span id="warpFiber1Gsm">0.00</span> GSM | Warp Fiber 2: <span id="warpFiber2Gsm">0.00</span> GSM</p>
  <hr>
  <p>Total Weft GSM: <span id="totalWeftGsm">0.00</span></p>
  <p class="blend-detail">Weft Fiber 1: <span id="weftFiber1Gsm">0.00</span> GSM | Weft Fiber 2: <span id="weftFiber2Gsm">0.00</span> GSM</p>
  <hr>
  <h2>Total Fabric GSM: <span id="finalGsm">0.00</span></h2>
</div>
